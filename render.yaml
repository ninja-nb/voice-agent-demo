services:
  - type: web
    name: audio-ai-agent-sample
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: OPENAI_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEFAULT_LLM_PROVIDER
        value: openai
      - key: DEFAULT_LLM_MODEL
        value: gpt-4.1-mini
      - key: DEFAULT_OPENAI_MODEL
        value: gpt-4.1-mini
      - key: DEFAULT_ANTHROPIC_MODEL
        value: claude-haiku-4-5-20251001
      - key: ANTHROPIC_ENABLED_MODELS
        value: "claude-haiku-4-5-20251001"
      - key: DEFAULT_TTS_VOICE
        value: alloy
